refs:
  # All base plugins (+current one)
  - pip://nmk-github!plugin.yml
  - pip://nmk-python!plugin.yml
  - pip://nmk-vscode!plugin.yml
  - pip://nmk-badges!plugin.yml
  - src/nmk_doc/plugin.yml
  - <workspace>/shared.yml
  - workspace:
      local: ../../../../shared
      remote: github://dynod/workspace/main/shared

# Python path for locally defined tasks
path:
  - src

config:
  # Plugin dependencies
  pythonPackageRequirements:
    - nmk-base >= 1.5.0
    - sphinx
    - furo
    - myst-parser

  # Extra project data
  pythonProjectFileItems:
    project:
      description: Documentation handling plugin for nmk build system
      entry-points:
        buildenv_template: # buildenv >=2 template
          nmk.doc: nmk_doc._buildenv.template:NmkDocProjectTemplate
          nmk.plantuml: nmk_doc._buildenv.template:NmkDocPlantUmlProjectTemplate
    tool:
      coverage:
        run:
          omit:
            - src/nmk_doc/_buildenv/template.py # New buildenv project template code

  # Github issues logged in nmk project
  githubIssuesRepo: nmk
  githubIssuesLabel: "plugin:doc"

  # For documentation
  venvPkgDeps:
    - cowsay
  docSnippets:
    example_snippet.txt: '${venvBin}/cowsay -t "sample snippet"'
